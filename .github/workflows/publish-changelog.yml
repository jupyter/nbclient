name: "Publish Changelog"
on:
  release:
    types: [published]

  workflow_dispatch:
    inputs:
      branch:
        description: "The branch to target"
        required: false

jobs:
  publish_changelog:
    runs-on: ubuntu-latest
    environment: release
    # The GITHUB_TOKEN is unused: all git/GitHub operations use the App token below.
    permissions: {}
    steps:
      - uses: jupyterlab/maintainer-tools/.github/actions/base-setup@95d85449e4f3f352e261221f6529f8ed307f5728 # v1

      - uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        id: app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Scope the token to what publish-changelog needs (push a branch, open a PR).
          permission-contents: write
          permission-pull-requests: write

      - name: Publish changelog
        id: publish-changelog
        uses: jupyter-server/jupyter_releaser/.github/actions/publish-changelog@634ac751f8a58d3d4a19b63f58aad138e6355cc8 # v2
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: ${{ github.event.inputs.branch }}

      - name: "** Next Step **"
        env:
          PR_URL: ${{ steps.publish-changelog.outputs.pr_url }}
        run: |
          echo "Merge the changelog update PR: $PR_URL"
